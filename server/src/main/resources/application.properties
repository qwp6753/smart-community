spring.application.name=smart-community-server

server.port=8080

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/smart_community?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

# Redis —— 开发环境默认关闭（使用内存存储），生产环境设为 true 并移除下方 auto-configure exclude
app.redis.enabled=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

mybatis-plus.configuration.map-underscore-to-camel-case=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

app.jwt.issuer=smart-community
app.jwt.secret=please-change-me
app.jwt.expire-seconds=7200

